<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VALUELINE | 3D Tile Viewer</title>
    <meta name="description" content="Explore VALUELINE premium tiles in immersive 3D panoramic views. Visualize tiles in bathrooms, kitchens, and facades.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loader">
        <div class="loader-content">
            <div class="loader-logo">VALUELINE</div>
            <div class="loader-subtitle">3D Tile Viewer</div>
            <div class="loader-bar-container">
                <div class="loader-bar" id="loader-bar"></div>
            </div>
            <div class="loader-text" id="loader-text">Loading experience...</div>
        </div>
    </div>

    <!-- 3D Viewer Container -->
    <div id="viewer-container"></div>

    <!-- Top Left: Zoom + Auto Rotate -->
    <div class="controls-group" id="controls-left">
        <button class="control-btn" id="btn-zoom-in" title="Zoom In">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="16.5" y1="16.5" x2="21" y2="21"/>
            </svg>
        </button>
        <button class="control-btn" id="btn-zoom-out" title="Zoom Out">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="16.5" y1="16.5" x2="21" y2="21"/>
            </svg>
        </button>
        <div class="control-divider"></div>
        <button class="control-btn active" id="btn-auto-rotate" title="Auto Rotate">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 1 1-6.219-8.56"/><polyline points="21 3 21 9 15 9"/>
            </svg>
        </button>
    </div>

    <!-- Top Center: Day/Night Toggle -->
    <div class="controls-group" id="controls-top-center">
        <div class="day-night-toggle" id="day-night-toggle">
            <div class="toggle-track" id="toggle-track">
                <div class="toggle-thumb" id="toggle-thumb">
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Top Right: Gallery Button -->
    <div class="controls-group" id="controls-right">
        <button class="control-btn" id="btn-gallery" title="Gallery">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
            </svg>
        </button>
    </div>

    <!-- Bottom Center: Skin Selector + Model Selector -->
    <div id="controls-bottom">
        <div class="skin-selector" id="skin-selector"></div>
        <div class="model-selector" id="model-selector"></div>
    </div>

    <!-- Gallery Overlay -->
    <div id="gallery-overlay" class="gallery-overlay">
        <div class="gallery-header">
            <h2>Gallery</h2>
            <button class="control-btn gallery-close" id="btn-gallery-close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="gallery-tabs" id="gallery-tabs"></div>
        <div class="gallery-grid" id="gallery-grid"></div>
    </div>

    <!-- Gallery Lightbox -->
    <div id="lightbox" class="lightbox">
        <button class="lightbox-close" id="lightbox-close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
        <button class="lightbox-nav lightbox-prev" id="lightbox-prev">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </button>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="Gallery Image">
        </div>
        <button class="lightbox-nav lightbox-next" id="lightbox-next">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"/>
            </svg>
        </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
